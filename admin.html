<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasboard Admin - Toko Budi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="css/style.css">
    <style>.clock-font { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace; letter-spacing: 1px; }</style>
</head>
<body class="w-full px-4 py-4 text-base bg-[#F4F4F4]">
    
    <div id="toast" class="fixed top-4 left-4 right-4 z-[100] mx-auto max-w-sm transition-all duration-300 -translate-y-10 opacity-0 pointer-events-none">
        <div id="toast-box" class="earth-card p-4 text-sm font-semibold text-center flex items-center justify-center gap-2"></div>
    </div>

    <div class="max-w-lg mx-auto">
        <header class="earth-card p-4 mb-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-white"><i data-lucide="layout-dashboard" class="w-5 h-5"></i></div>
                <div>
                    <h1 class="text-sm font-bold leading-tight text-gray-900">Admin Panel</h1>
                    <div class="flex items-center gap-1.5"><div class="w-1.5 h-1.5 bg-green-500 rounded-full"></div><span id="admin-email" class="text-[10px] text-gray-400">Loading...</span></div>
                </div>
            </div>
            <div class="text-right">
                <div id="live-clock" class="clock-font text-sm font-semibold text-gray-900">00:00:00</div>
                <div id="live-date" class="text-[10px] text-gray-400">Loading date...</div>
            </div>
        </header>

        <div class="earth-card p-1 flex gap-1 mb-6">
            <button class="tab-btn sidebar-active flex-1 py-2.5 rounded-xl text-xs font-semibold text-center flex flex-col items-center gap-0.5 text-white" data-page="dashboard"><i data-lucide="home" class="w-4 h-4"></i> Home</button>
            <button class="tab-btn flex-1 py-2.5 rounded-xl text-xs font-semibold text-center flex flex-col items-center gap-0.5 text-gray-400" data-page="produk"><i data-lucide="box" class="w-4 h-4"></i> Produk</button>
            <button class="tab-btn flex-1 py-2.5 rounded-xl text-xs font-semibold text-center flex flex-col items-center gap-0.5 text-gray-400" data-page="pengaturan"><i data-lucide="settings" class="w-4 h-4"></i> Setting</button>
        </div>

        <main id="page-dashboard" class="page active">
            <div class="earth-card p-6 text-center mb-4 bg-black text-white border-0 shadow-xl">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-2">Waktu Server Lokal</p>
                <div id="big-clock" class="clock-font text-4xl font-bold text-white mb-1">00:00:00</div>
                <div id="big-date" class="text-xs text-gray-400">Loading...</div>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="earth-card p-4 text-center"><div class="w-10 h-10 mx-auto bg-gray-100 rounded-lg flex items-center justify-center text-gray-600 mb-2"><i data-lucide="package" class="w-5 h-5"></i></div><h3 class="text-2xl font-bold text-gray-900" id="stat-total">0</h3><p class="text-[10px] text-gray-400 mt-1">Total Produk</p></div>
                <div class="earth-card p-4 text-center"><div class="w-10 h-10 mx-auto bg-gray-100 rounded-lg flex items-center justify-center text-gray-600 mb-2"><i data-lucide="alert-triangle" class="w-5 h-5"></i></div><h3 class="text-2xl font-bold text-gray-900" id="stat-empty">0</h3><p class="text-[10px] text-gray-400 mt-1">Stok Habis</p></div>
            </div>
            <button id="logout-btn" class="w-full py-3.5 rounded-xl text-sm font-semibold bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 transition-colors flex items-center justify-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> Logout</button>
            <a href="index.html" class="flex items-center justify-center gap-2 text-sm text-gray-400 hover:text-black transition-colors mt-6 mb-4"><i data-lucide="external-link" class="w-4 h-4"></i> Buka Halaman Toko Publik</a>
        </main>

        <main id="page-produk" class="page">
            <button id="add-product-btn" class="w-full py-3.5 rounded-xl text-sm font-semibold bg-black text-white shadow-sm hover:bg-gray-800 transition-all flex items-center justify-center gap-2 mb-5"><i data-lucide="plus-circle" class="w-5 h-5"></i> Tambah Produk</button>
            <div id="products-list" class="space-y-2"><div class="skeleton h-24 rounded-2xl"></div><div class="skeleton h-24 rounded-2xl"></div></div>
        </main>

        <main id="page-pengaturan" class="page">
            <div class="earth-card p-5 space-y-4 mb-4">
                <h2 class="text-sm font-bold text-gray-900">Pengaturan Toko</h2>
                <div class="flex items-center gap-3"><img id="logo-preview" src="https://picsum.photos/id/64/200/200" class="w-16 h-16 rounded-xl object-cover border border-gray-100"><div class="flex-1"><label class="text-xs text-gray-400 mb-1 block">Logo</label><input type="file" id="logo-file" accept="image/*" class="p-2 rounded-lg text-xs file:bg-black file:text-white file:border-0 file:rounded-lg file:px-3 file:py-1 file:mr-2 file:font-semibold w-full"></div><input type="hidden" id="logo-url"></div>
                <div><label class="text-xs text-gray-400 mb-1 block">Username</label><input type="text" id="username-input" placeholder="@tokobudi" class="p-3 rounded-xl w-full text-sm"></div>
                <div><label class="text-xs text-gray-400 mb-1 block">Bio</label><textarea id="bio-input" rows="2" class="p-3 rounded-xl w-full text-sm resize-none"></textarea></div>
                <div><label class="text-xs text-gray-400 mb-1 block">Link WA</label><input type="text" id="wa-input" placeholder="https://wa.me/62812..." class="p-3 rounded-xl w-full text-sm"></div>
                <div><label class="text-xs text-gray-400 mb-1 block">Link Shopee</label><input type="text" id="shopee-input" placeholder="https://shopee.co.id/..." class="p-3 rounded-xl w-full text-sm"></div>
                <button id="save-settings-btn" class="w-full py-3.5 rounded-xl text-sm font-semibold bg-gray-100 hover:bg-gray-200 text-gray-900 transition-colors flex items-center justify-center gap-2"><i data-lucide="save" class="w-4 h-4"></i> Simpan Pengaturan</button>
            </div>
            <div class="earth-card p-5 space-y-4 border border-red-100">
                <h2 class="text-sm font-bold text-red-600">Keamanan Akun</h2>
                <div><label class="text-xs text-gray-400 mb-1 block">Email Saat Ini</label><input type="email" id="new-email-input" class="p-3 rounded-xl w-full text-sm"></div>
                <div><label class="text-xs text-gray-400 mb-1 block">Password Baru</label><input type="password" id="new-password-input" placeholder="Kosongkan jika tidak diganti" class="p-3 rounded-xl w-full text-sm"></div>
                <div class="pt-2 border-t border-gray-100"><label class="text-xs text-red-500 font-bold mb-1 block">Password Lama (Wajib)</label><input type="password" id="reauth-password-input" placeholder="Masukkan password lama" class="p-3 rounded-xl w-full text-sm"></div>
                <button id="save-account-btn" class="w-full py-3.5 rounded-xl text-sm font-semibold bg-red-50 hover:bg-red-100 text-red-600 transition-colors flex items-center justify-center gap-2"><i data-lucide="key" class="w-4 h-4"></i> Update Akun</button>
            </div>
        </main>
    </div>

    <div id="product-modal" class="modal fixed inset-0 bg-black/30 backdrop-blur-sm items-center justify-center" style="display:none;">
        <div class="modal-content earth-card p-5 w-full max-w-sm m-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4"><h2 id="modal-title" class="text-base font-bold text-gray-900">Tambah Produk</h2><span class="close-btn cursor-pointer text-gray-300 hover:text-gray-800 text-2xl leading-none">&times;</span></div>
            <form id="product-form" class="space-y-3">
                <input type="hidden" id="product-id">
                <div><label class="text-xs text-gray-400 mb-1 block">Nama Produk</label><input type="text" id="product-name" required class="p-3 rounded-xl w-full text-sm"></div>
                <div class="grid grid-cols-2 gap-3"><div><label class="text-xs text-gray-400 mb-1 block">Harga</label><input type="number" id="product-price" required class="p-3 rounded-xl w-full text-sm"></div><div><label class="text-xs text-gray-400 mb-1 block">Stok</label><input type="number" id="product-stock" required class="p-3 rounded-xl w-full text-sm"></div></div>
                <div><label class="text-xs text-gray-400 mb-1 block">Deskripsi</label><textarea id="product-description" rows="2" class="p-3 rounded-xl w-full text-sm resize-none"></textarea></div>
                <div><label class="text-xs text-gray-400 mb-1 block">Link WA (Opsional)</label><input type="text" id="product-wa" placeholder="Kosongkan jika pake WA Utama" class="p-3 rounded-xl w-full text-sm"></div>
                <div><label class="text-xs text-gray-400 mb-1 block">Link Shopee (Opsional)</label><input type="text" id="product-shopee" placeholder="Kosongkan jika pake Shopee Utama" class="p-3 rounded-xl w-full text-sm"></div>
                <div><label class="text-xs text-gray-400 mb-1 block">Gambar Produk</label><input type="file" id="product-image-file" accept="image/*" class="p-2 rounded-xl w-full text-xs file:bg-black file:text-white file:border-0 file:rounded-lg file:px-3 file:py-1 file:mr-2 file:font-semibold"><input type="hidden" id="product-image-url"><img id="image-preview" src="" alt="Preview" style="display:none;" class="w-20 h-20 object-cover rounded-xl mt-2 border border-gray-100"></div>
                <button type="submit" id="save-product-btn" class="w-full py-3.5 rounded-xl text-sm font-semibold bg-black text-white shadow-sm hover:bg-gray-800 flex items-center justify-center gap-2"><i data-lucide="check-circle" class="w-4 h-4"></i> Simpan</button>
            </form>
        </div>
    </div>
    <script type="module" src="./js/admin.js"></script>
</body>
</html>

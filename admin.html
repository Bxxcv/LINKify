<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasboard Admin - Toko Budi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Font Jam Digital */
        .clock-font { font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; }
    </style>
</head>
<body class="w-full px-4 py-4 text-base">
    
    <!-- NOTIFIKASI TOAST -->
    <div id="toast" class="fixed top-4 left-4 right-4 z-[100] mx-auto max-w-sm transition-all duration-300 -translate-y-10 opacity-0 pointer-events-none">
        <div id="toast-box" class="glass rounded-2xl p-4 text-sm font-bold text-center flex items-center justify-center gap-2">
            <span id="toast-msg">Berhasil!</span>
        </div>
    </div>

    <div class="max-w-2xl mx-auto">
        
        <!-- HEADER NAVIGASI (DITAMBAH JAM) -->
        <header class="glass rounded-3xl p-4 mb-6 flex items-center justify-between border-t-4 border-amber-400">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-400/20 rounded-xl flex items-center justify-center text-amber-400">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold leading-tight">Admin Panel</h1>
                    <div class="flex items-center gap-1.5">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span id="admin-email" class="text-[10px] text-white/40">Loading...</span>
                    </div>
                </div>
            </div>
            
            <!-- JAM REAL-TIME BARU -->
            <div class="text-right">
                <div id="live-clock" class="clock-font text-base font-bold text-amber-400">00:00:00</div>
                <div id="live-date" class="text-[10px] text-white/40">Loading date...</div>
            </div>
        </header>

        <!-- NAVIGASI TABS (DITAMBAH DASHBOARD) -->
        <div class="glass p-1.5 flex gap-1 mb-6 rounded-2xl">
            <button class="tab-btn sidebar-active flex-1 py-3 rounded-xl text-xs font-bold text-center flex flex-col items-center gap-0.5" data-page="dashboard">
                <i data-lucide="home" class="w-4 h-4"></i> Home
            </button>
            <button class="tab-btn flex-1 py-3 rounded-xl text-xs font-bold text-center text-white/50 flex flex-col items-center gap-0.5" data-page="produk">
                <i data-lucide="box" class="w-4 h-4"></i> Produk
            </button>
            <button class="tab-btn flex-1 py-3 rounded-xl text-xs font-bold text-center text-white/50 flex flex-col items-center gap-0.5" data-page="pengaturan">
                <i data-lucide="settings" class="w-4 h-4"></i> Setting
            </button>
        </div>

        <!-- PAGE: DASHBOARD HOME (HALAMAN BARU) -->
        <main id="page-dashboard" class="page active">
            <div class="glass rounded-3xl p-6 text-center mb-4 border border-amber-400/20">
                <p class="text-xs text-white/40 uppercase tracking-widest mb-2">Waktu Server Lokal</p>
                <div id="big-clock" class="clock-font text-5xl font-extrabold text-white mb-1">00:00:00</div>
                <div id="big-date" class="text-sm text-white/50">Loading...</div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <!-- Statistik Produk -->
                <div class="glass rounded-2xl p-4 text-center">
                    <div class="w-12 h-12 mx-auto bg-blue-500/20 rounded-xl flex items-center justify-center text-blue-400 mb-3">
                        <i data-lucide="package" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-2xl font-extrabold" id="stat-total">0</h3>
                    <p class="text-xs text-white/40 mt-1">Total Produk</p>
                </div>
                <!-- Statistik Stok Habis -->
                <div class="glass rounded-2xl p-4 text-center">
                    <div class="w-12 h-12 mx-auto bg-red-500/20 rounded-xl flex items-center justify-center text-red-400 mb-3">
                        <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-2xl font-extrabold" id="stat-empty">0</h3>
                    <p class="text-xs text-white/40 mt-1">Stok Habis</p>
                </div>
            </div>

            <button id="logout-btn" class="w-full py-4 rounded-2xl text-sm font-bold bg-red-500/10 hover:bg-red-500/20 text-red-400 transition-colors flex items-center justify-center gap-2 border border-red-500/20">
                <i data-lucide="log-out" class="w-4 h-4"></i> Logout dari Sistem
            </button>
            
            <a href="index.html" class="flex items-center justify-center gap-2 text-sm text-white/30 hover:text-amber-400 transition-colors mt-6 mb-4">
                <i data-lucide="external-link" class="w-4 h-4"></i>
                Buka Halaman Toko Publik
            </a>
        </main>

        <!-- PAGE: PRODUK -->
        <main id="page-produk" class="page">
            <button id="add-product-btn" class="w-full py-4 rounded-2xl text-sm font-bold bg-gradient-to-r from-amber-400 to-orange-500 text-black shadow-lg shadow-amber-500/20 hover:shadow-amber-500/40 transition-all flex items-center justify-center gap-2 mb-5">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> Tambah Produk Baru
            </button>
            <div id="products-list" class="space-y-3">
                <div class="skeleton h-28 rounded-2xl"></div>
                <div class="skeleton h-28 rounded-2xl"></div>
            </div>
        </main>

        <!-- PAGE: PENGATURAN -->
        <main id="page-pengaturan" class="page">
            
            <!-- PENGATURAN TOKO -->
            <div class="glass rounded-3xl p-6 space-y-5 mb-4">
                <h2 class="text-base font-bold flex items-center gap-2"><i data-lucide="store" class="w-5 h-5 text-white/50"></i> Pengaturan Toko</h2>
                
                <div class="flex items-center gap-4">
                    <img id="logo-preview" src="https://picsum.photos/id/64/200/200" class="w-20 h-20 rounded-2xl object-cover border-2 border-dashed border-white/20">
                    <div class="flex-1">
                        <label class="text-sm text-white/50 mb-1 block font-medium">Logo / Foto Profil</label>
                        <input type="file" id="logo-file" accept="image/*" class="bg-white/5 p-2.5 rounded-xl text-xs file:bg-amber-400 file:text-black file:border-0 file:rounded-lg file:px-3 file:py-1.5 file:mr-2 file:font-bold w-full">
                    </div>
                    <input type="hidden" id="logo-url">
                </div>

                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Username Toko</label>
                    <input type="text" id="username-input" placeholder="@tokobudi" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Bio / Deskripsi</label>
                    <textarea id="bio-input" rows="2" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10 resize-none"></textarea>
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Link WhatsApp Utama</label>
                    <input type="text" id="wa-input" placeholder="https://wa.me/62812..." class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Link Shopee Utama</label>
                    <input type="text" id="shopee-input" placeholder="https://shopee.co.id/..." class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                
                <button id="save-settings-btn" class="w-full py-4 rounded-2xl mt-2 text-sm font-bold bg-white/10 hover:bg-white/20 text-white transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Simpan Pengaturan Toko
                </button>
            </div>

            <!-- KEAMANAN AKUN -->
            <div class="glass rounded-3xl p-6 space-y-5 border-t-4 border-red-500/50">
                <h2 class="text-base font-bold flex items-center gap-2"><i data-lucide="shield" class="w-5 h-5 text-red-400"></i> Keamanan Akun</h2>
                
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Email Saat Ini</label>
                    <input type="email" id="new-email-input" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Password Baru</label>
                    <input type="password" id="new-password-input" placeholder="Kosongkan jika tidak ingin diganti" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>

                <div class="pt-2 border-t border-white/10">
                    <label class="text-sm text-red-400 font-bold mb-1 block">Konfirmasi Password Lama (Wajib diisi!)</label>
                    <input type="password" id="reauth-password-input" placeholder="Masukkan password lama untuk validasi" class="bg-red-500/5 p-3.5 rounded-xl w-full text-sm border border-red-500/20 focus:border-red-400">
                </div>
                
                <button id="save-account-btn" class="w-full py-4 rounded-2xl mt-2 text-sm font-bold bg-red-500/20 hover:bg-red-500/30 text-red-400 transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="key" class="w-4 h-4"></i> Update Akun
                </button>
            </div>
        </main>
    </div>

    <!-- Modal Produk -->
    <div id="product-modal" class="modal fixed inset-0 bg-black/60 backdrop-blur-sm items-center justify-center" style="display:none;">
        <div class="modal-content glass rounded-3xl p-6 w-full max-w-sm m-4 max-h-[90vh] overflow-y-auto border-t-4 border-amber-400">
            <div class="flex justify-between items-center mb-5">
                <h2 id="modal-title" class="text-lg font-bold">Tambah Produk</h2>
                <span class="close-btn cursor-pointer text-white/50 hover:text-white text-3xl leading-none">&times;</span>
            </div>
            <form id="product-form" class="space-y-4">
                <input type="hidden" id="product-id">
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Nama Produk</label>
                    <input type="text" id="product-name" required class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-sm text-white/50 mb-1 block font-medium">Harga</label>
                        <input type="number" id="product-price" required class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                    </div>
                    <div>
                        <label class="text-sm text-white/50 mb-1 block font-medium">Stok</label>
                        <input type="number" id="product-stock" required class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Deskripsi</label>
                    <textarea id="product-description" rows="2" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10 resize-none"></textarea>
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Link WA Produk (Opsional)</label>
                    <input type="text" id="product-wa" placeholder="Kosongkan jika pake WA Utama" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Link Shopee Produk (Opsional)</label>
                    <input type="text" id="product-shopee" placeholder="Kosongkan jika pake Shopee Utama" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block font-medium">Gambar Produk</label>
                    <input type="file" id="product-image-file" accept="image/*" class="bg-white/5 p-2.5 rounded-xl w-full text-xs file:bg-amber-400 file:text-black file:border-0 file:rounded-lg file:px-3 file:py-1.5 file:mr-2 file:font-bold">
                    <input type="hidden" id="product-image-url">
                    <img id="image-preview" src="" alt="Preview" style="display:none;" class="w-24 h-24 object-cover rounded-xl mt-3 border-2 border-dashed border-white/20">
                </div>
                <button type="submit" id="save-product-btn" class="w-full py-4 rounded-2xl mt-2 text-sm font-bold bg-gradient-to-r from-amber-400 to-orange-500 text-black shadow-lg shadow-amber-500/20 flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-4 h-4"></i> Simpan Produk
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="./js/admin.js"></script>
</body>
</html>
